<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROTA | Dashboard</title>

<link rel="stylesheet" href="./style.css">
<script defer src="./script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<header class="navbar">
  <div class="logo">ROTA <span>Painel Operacional</span></div>
  <button id="logout" class="btn-outline">Sair</button>
</header>

<section class="dashboard">

  <div class="stats-grid">
    <div class="card"><h2 id="ocorrencias">0</h2><p>Ocorrências</p></div>
    <div class="card"><h2 id="prisoes">0</h2><p>Prisões</p></div>
    <div class="card"><h2 id="apreensoes">0</h2><p>Apreensões</p></div>
    <div class="card"><h2 id="municoes">0</h2><p>Munições</p></div>
  </div>

  <div class="chart-box">
    <canvas id="statsChart"></canvas>
  </div>

</section>

</body>
</html>
