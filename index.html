<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Membros</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Painel de Membros</h1>
</header>

<nav>
<button onclick="abrirAba('recrutas')">Recrutas</button>
<button onclick="abrirAba('soldados')">Soldados</button>
<button onclick="abrirAba('cabos')">Cabos</button>
<button onclick="abrirAba('sargentos')">Sargentos</button>
<button onclick="abrirAba('tenentes')">Tenentes</button>
<button onclick="abrirAba('capitaes')">Capitães</button>
<button onclick="abrirAba('coroneis')">Coronéis</button>
<button onclick="abrirAba('geral')">Generais</button>
</nav>

<main>

<div id="recrutas" class="aba ativa">
<h2>Recrutas</h2>
<ul id="listaRecrutas"></ul>
</div>

<div id="soldados" class="aba">
<h2>Soldados</h2>
<ul id="listaSoldados"></ul>
</div>

<div id="cabos" class="aba">
<h2>Cabos</h2>
<ul id="listaCabos"></ul>
</div>

<div id="sargentos" class="aba">
<h2>Sargentos</h2>
<ul id="listaSargentos"></ul>
</div>

<div id="tenentes" class="aba">
<h2>Tenentes</h2>
<ul id="listaTenentes"></ul>
</div>

<div id="capitaes" class="aba">
<h2>Capitães</h2>
<ul id="listaCapitaes"></ul>
</div>

<div id="coroneis" class="aba">
<h2>Coronéis</h2>
<ul id="listaCoroneis"></ul>
</div>

<div id="geral" class="aba">
<h2>Generais</h2>
<ul id="listaGenerais"></ul>
</div>

</main>

<script src="script.js"></script>
</body>
</html>
