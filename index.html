<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Membros</title>

<style>
body{
font-family: Arial;
margin:0;
background:#f3f4f6;
}

header{
background:#111827;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

nav{
background:#1f2937;
padding:10px;
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:center;
}

nav button{
background:#2563eb;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

nav button:hover{
background:#1d4ed8;
}

main{
padding:20px;
}

.aba{
display:none;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.05);
}

.ativa{
display:block;
}

li{
padding:6px 0;
border-bottom:1px solid #eee;
}
</style>

</head>

<body>

<header>Painel de Hierarquia</header>

<nav>
<button onclick="abrirAba('recrutas')">Recrutas</button>
<button onclick="abrirAba('soldados')">Soldados</button>
<button onclick="abrirAba('cabos')">Cabos</button>
<button onclick="abrirAba('sargentos')">Sargentos</button>
<button onclick="abrirAba('tenentes')">Tenentes</button>
<button onclick="abrirAba('capitaes')">Capitães</button>
<button onclick="abrirAba('coroneis')">Coronéis</button>
<button onclick="abrirAba('generais')">Generais</button>
</nav>

<main>

<div id="recrutas" class="aba ativa"><h2>Recrutas</h2></div>
<div id="soldados" class="aba"><h2>Soldados</h2></div>
<div id="cabos" class="aba"><h2>Cabos</h2></div>
<div id="sargentos" class="aba"><h2>Sargentos</h2></div>
<div id="tenentes" class="aba"><h2>Tenentes</h2></div>
<div id="capitaes" class="aba"><h2>Capitães</h2></div>
<div id="coroneis" class="aba"><h2>Coronéis</h2></div>
<div id="generais" class="aba"><h2>Generais</h2></div>

</main>

<script>
function abrirAba(id){
document.querySelectorAll(".aba").forEach(a=>a.classList.remove("ativa"))
document.getElementById(id).classList.add("ativa")
}
</script>

</body>
</html>
